name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: pnpm/action-setup@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: pnpm install --frozen-lockfile

      - name: Build project
        if: ${{ steps.release.outputs.release_created }}
        run: pnpm build

      - name: Create release artifacts
        if: ${{ steps.release.outputs.release_created }}
        run: |
          tar -czf shorly-${{ steps.release.outputs.tag_name }}.tar.gz apps/ packages/
          zip -r shorly-${{ steps.release.outputs.tag_name }}.zip apps/ packages/

      - name: Upload Release Artifacts
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.release.outputs.tag_name }} \
            shorly-${{ steps.release.outputs.tag_name }}.tar.gz \
            shorly-${{ steps.release.outputs.tag_name }}.zip
