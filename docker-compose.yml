services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: shorly-postgres
    restart: unless-stopped
    env_file:
      - apps/api/.env
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shorly

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: shorly-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - shorly

  # NestJS API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: shorly-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://shorly:shorly_password@postgres:5432/shorly
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - shorly
    command: sh -c "npx prisma migrate deploy && node dist/main"

  # Next.js Web App
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: shorly-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - apps/web/.env.local
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - shorly

networks:
  shorly:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
